---
# swim_details provides ready-to-use config blocks for each SWIM playbook phase.
# Each section maps directly to swim_workflow_manager config keys:
#   import_images      → 10_import_and_tag.yml  (import task)
#   golden_tag_images  → 10_import_and_tag.yml  (tag task)
#   distribute_images  → 20_distribute.yml
#   activate_images    → 30_activate.yml
#   rollback_images    → 35_rollback.yml
#
# Each entry carries a 'name' key used only for loop labels (not passed to the
# module) and a single module-config key (import_image_details / tagging_details
# / image_distribution_details / image_activation_details).
# To target an additional site or role, add another entry to the relevant section.
#
# DEVICE FAMILY NAMING — three different names used in different places:
#   golden_tag_images / rollback_images.tag:
#     device_image_family_name: CatC SWIM identifier (GET /dna/intent/api/v1/
#     image/importation/device-family-identifiers). This cluster: id 999999901.
#   distribute_images / activate_images / rollback_images.activate:
#     device_family_name: inventory family from network-device API ("Switches and Hubs")
#     device_series_name: inventory series ("Cisco Catalyst 9000 Series Virtual Switches")
swim_details:

  # --------------------------------------------------------------------------
  # IMPORT: pull images from the file server into the CatC repository.
  # Both the upgrade image and the rollback image are imported here so the
  # rollback target is present in CatC before activation ever runs -- not
  # scrambled for after a failure.
  # --------------------------------------------------------------------------
  import_images:
    - name: cat9kv_throttle_26.2
      import_image_details:
        type: remote
        url_details:
          payload:
            - source_url:
                - "http://198.18.134.28/images/cat9kv-universalk9.BLD_V262_THROTTLE_LATEST_20260529_003538.SSA.bin"
              is_third_party: false
    - name: cat9kv_stable_17.15.3
      import_image_details:
        type: remote
        url_details:
          payload:
            - source_url:
                - "http://198.18.134.28/images/cat9kv-universalk9.17.15.03.SPA.bin"
              is_third_party: false

  # --------------------------------------------------------------------------
  # ALTERNATIVE: import directly from Cisco.com (CCO) instead of a local file
  # server. Requires a valid cisco.com account configured in CatC under
  # System > Settings > Cisco.com Credentials.
  # Ref: https://galaxy.ansible.com/ui/repo/published/cisco/catalystcenter/content/module/swim_workflow_manager/?keywords=swim#examples
  #
  # Single image from CCO:
  #
  #   - name: cat9kv_from_cco
  #     import_image_details:
  #       type: CCO
  #       cco_image_details:
  #         image_name: cat9k_iosxe.17.15.03.SPA.bin
  #
  # Multiple images from CCO in one entry:
  #
  #   - name: cat9kv_bulk_from_cco
  #     import_image_details:
  #       type: CCO
  #       cco_image_details:
  #         image_name:
  #           - cat9k_iosxe.17.15.03.SPA.bin
  #           - cat9kv-universalk9.BLD_V262_THROTTLE_LATEST_20260529_003538.SSA.bin
  #
  # Notes:
  #   - 'type: CCO' vs 'type: remote' — CCO pulls from cisco.com; remote pulls
  #     from an HTTP/FTP URL you control (used above for lab).
  #   - Only the latest Cisco-recommended images are available via CCO.
  #   - Engineering/throttle builds (e.g. BLD_V262_THROTTLE_*) are NOT published
  #     to CCO — they must be imported via 'type: remote' or 'type: local'.
  # --------------------------------------------------------------------------

  # --------------------------------------------------------------------------
  # GOLDEN TAG: mark the upgrade image as golden for a specific site and role.
  # device_image_family_name must be the CatC SWIM device-family IDENTIFIER,
  # NOT the inventory family/series. On this cluster:
  #   "Cisco Catalyst 9000 UADP 8 Port Virtual Switch" (id 999999901)
  # --------------------------------------------------------------------------
  golden_tag_images:
    - name: cat9kv_throttle_26.2 @ Floor 1 / ALL
      tagging_details:
        image_name: "cat9kv-universalk9.BLD_V262_THROTTLE_LATEST_20260529_003538.SSA.bin"
        device_role: ALL
        device_image_family_name: "Cisco Catalyst 9000 UADP 8 Port Virtual Switch"
        site_name: "Global/PODS/POD 0/Building P0/Floor 1"
        tagging: true

  # --------------------------------------------------------------------------
  # DISTRIBUTE: push the image binary to devices (no reload).
  # device_family_name / device_series_name must match inventory fields
  # (network-device API family/series), NOT the golden-tag identifier.
  # --------------------------------------------------------------------------
  distribute_images:
    - name: cat9kv_throttle_26.2 @ Floor 1 / ALL
      image_distribution_details:
        image_name: "cat9kv-universalk9.BLD_V262_THROTTLE_LATEST_20260529_003538.SSA.bin"
        site_name: "Global/PODS/POD 0/Building P0/Floor 1"
        device_role: ALL
        device_family_name: "Switches and Hubs"
        device_series_name: "Cisco Catalyst 9000 Series Virtual Switches"

  # --------------------------------------------------------------------------
  # ACTIVATE: reload devices onto the distributed image.
  # distribute_if_needed: true lets CatC distribute first if not already done.
  # --------------------------------------------------------------------------
  activate_images:
    - name: cat9kv_throttle_26.2 @ Floor 1 / ALL
      image_activation_details:
        image_name: "cat9kv-universalk9.BLD_V262_THROTTLE_LATEST_20260529_003538.SSA.bin"
        site_name: "Global/PODS/POD 0/Building P0/Floor 1"
        device_role: ALL
        device_family_name: "Switches and Hubs"
        device_series_name: "Cisco Catalyst 9000 Series Virtual Switches"
        activate_lower_image_version: false
        device_upgrade_mode: "install"
        distribute_if_needed: true
        schedule_validate: false

  # --------------------------------------------------------------------------
  # ROLLBACK: return devices to the prior-stable image (35_rollback.yml).
  # Two sub-sections run in order: re-tag the stable image as golden, then
  # activate it. activate_lower_image_version: true is required because the
  # stable image version is lower than the currently-running upgrade image.
  # --------------------------------------------------------------------------
  rollback_images:
    tag:
      - name: cat9kv_stable_17.15.3 @ Floor 1 / ALL
        tagging_details:
          image_name: "cat9kv-universalk9.17.15.03.SPA.bin"
          device_role: ALL
          device_image_family_name: "Cisco Catalyst 9000 UADP 8 Port Virtual Switch"
          site_name: "Global/PODS/POD 0/Building P0/Floor 1"
          tagging: true
    activate:
      - name: cat9kv_stable_17.15.3 @ Floor 1 / ALL
        image_activation_details:
          image_name: "cat9kv-universalk9.17.15.03.SPA.bin"
          site_name: "Global/PODS/POD 0/Building P0/Floor 1"
          device_role: ALL
          device_family_name: "Switches and Hubs"
          device_series_name: "Cisco Catalyst 9000 Series Virtual Switches"
          activate_lower_image_version: true
          distribute_if_needed: true
          schedule_validate: true

