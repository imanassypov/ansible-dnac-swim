---
- name: Import IOS-XE images and tag golden
  hosts: catc
  connection: local
  gather_facts: false
  vars_files:
    - ../vars/images.yml
  vars:
    run_id: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
  tasks:
    - name: Import image into Catalyst Center repository
      cisco.catalystcenter.swim_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_log: "{{ catalystcenter_log }}"
        catalystcenter_log_level: "{{ catalystcenter_log_level }}"
        catalystcenter_log_file_path: "{{ catalystcenter_log_file_path }}"
        catalystcenter_log_append: "{{ catalystcenter_log_append }}"
        validate_response_schema: "{{ validate_response_schema }}"
        catalystcenter_api_task_timeout: "{{ catalystcenter_api_task_timeout }}"
        catalystcenter_task_poll_interval: "{{ catalystcenter_task_poll_interval }}"
        config_verify: true
        state: merged
        config:
          - import_image_details: "{{ item.import_image_details }}"
      # swim_details.import_images includes BOTH the upgrade and rollback images
      # so CatC holds the rollback target before activation is ever attempted.
      loop: "{{ swim_details.import_images }}"
      loop_control:
        label: "{{ item.name }}"
      register: import_result

    - name: Tag image golden per family, role, and site
      cisco.catalystcenter.swim_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_log: "{{ catalystcenter_log }}"
        catalystcenter_log_level: "{{ catalystcenter_log_level }}"
        catalystcenter_log_file_path: "{{ catalystcenter_log_file_path }}"
        catalystcenter_log_append: "{{ catalystcenter_log_append }}"
        validate_response_schema: "{{ validate_response_schema }}"
        catalystcenter_api_task_timeout: "{{ catalystcenter_api_task_timeout }}"
        catalystcenter_task_poll_interval: "{{ catalystcenter_task_poll_interval }}"
        config_verify: true
        state: merged
        config:
          - tagging_details: "{{ item.tagging_details }}"
      loop: "{{ swim_details.golden_tag_images }}"
      loop_control:
        label: "{{ item.name }}"
      register: tag_result

    - name: Write import and tag evidence
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../logs/{{ run_id }}-10_import_and_tag.json"
        content: "{{ {'import': import_result, 'tag': tag_result} | to_nice_json }}"
        mode: "0640"
