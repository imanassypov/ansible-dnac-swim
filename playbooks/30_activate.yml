---
- name: Activate image on targets (reloads devices)
  hosts: catc
  connection: local
  gather_facts: false
  vars_files:
    - ../vars/images.yml
  vars:
    run_id: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
  tasks:
    - name: Activate golden image
      cisco.catalystcenter.swim_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_log: "{{ catalystcenter_log }}"
        catalystcenter_log_level: "{{ catalystcenter_log_level }}"
        catalystcenter_log_file_path: "{{ catalystcenter_log_file_path }}"
        catalystcenter_log_append: "{{ catalystcenter_log_append }}"
        validate_response_schema: "{{ validate_response_schema }}"
        catalystcenter_api_task_timeout: 7200
        catalystcenter_task_poll_interval: 60
        config_verify: true
        # state: merged — instructs the module to drive Catalyst Center toward the declared
        # configuration, creating or updating as needed. For activation this means: "ensure this
        # image is activated on the target devices." If the image is already activated and
        # committed, the module detects that and returns ok (changed=false) without issuing
        # redundant API calls, making the task idempotent. The alternative, state: deleted,
        # would undo/remove the configuration — not applicable for activation.
        state: merged
        # config: is the list-based declarative payload accepted by all *_workflow_manager modules.
        # The sub-key present in each list entry determines which SWIM operation is performed:
        #   import_image_details   → import into repository
        #   tagging_details        → golden tag
        #   image_distribution_details → distribute (install add, no reload)
        #   image_activation_details   → activate (install activate + install commit, reboots)
        # The module routes internally to the correct Catalyst Center SWIM API based on which
        # sub-key is present — one module covers the full SWIM lifecycle via different sub-keys.
        config:
          # image_activation_details carries all targeting and behavioral parameters:
          #   image_name              — the .bin to activate (must already be distributed)
          #   site_name               — scope: activates on all eligible devices at this site
          #   device_family_name      — inventory family ("Switches and Hubs")
          #   device_series_name      — inventory series ("Cisco Catalyst 9000 Series Virtual Switches")
          #   device_role             — ALL | ACCESS | DISTRIBUTION | CORE | BORDER ROUTER
          #   activate_lower_image_version: false — blocks accidental downgrades (true for rollback)
          #   distribute_if_needed: true          — safety fallback: re-distributes if not on flash
          #   schedule_validate: true             — runs pre-activation checks before committing
          # Catalyst Center translates these into the three IOS-XE install-mode steps:
          #   install-activate  (triggers reload — device is offline during this step)
          #   install-commit    (executed post-reload to permanently commit the new image)
          # Reference: Catalyst Center 2.3.7 User Guide — View image update workflow
          - image_activation_details: "{{ item.image_activation_details }}"
      loop: "{{ swim_details.activate_images }}"
      loop_control:
        label: "{{ item.name }}"
      register: activate_result

    - name: Write activation evidence
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../logs/{{ run_id }}-30_activate.json"
        content: "{{ activate_result | to_nice_json }}"
        mode: "0640"
